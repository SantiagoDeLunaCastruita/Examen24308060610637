<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil - NutriApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="/">🌿 NutriApp</a>
            
            <div class="ms-auto">
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        {{ session['usuario_nombre'] }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><a class="dropdown-item active" href="/perfil">⚙️ Editar Perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/salir">🚪 Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4">
                        <h3 class="fw-bold text-center mb-4">Mi Perfil</h3>
                        
                        {% if mensaje %}
                        <div class="alert alert-success border-0 shadow-sm text-center">{{ mensaje }}</div>
                        {% endif %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-uppercase text-muted">Nombre Completo</label>
                                <input type="text" name="nombre" class="form-control form-control-lg" value="{{ usuario.nombre }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-uppercase text-muted">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control form-control-lg" value="{{ usuario.email }}" required>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-success btn-lg fw-bold">GUARDAR CAMBIOS</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
