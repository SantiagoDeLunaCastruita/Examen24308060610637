<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - NutriApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="/">🌿 NutriApp</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-light me-3 small">Hola, <b>{{ session['usuario_nombre'] }}</b></span>
                <div class="btn-group">
                    <a href="/tareas" class="btn btn-sm btn-success fw-bold">📋 Tareas</a>
                    <a href="/perfil" class="btn btn-sm btn-outline-light">Mi Perfil</a>
                    <a href="/salir" class="btn btn-sm btn-outline-danger">Salir</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="card p-4 shadow-lg border-0" style="width: 28rem; border-radius: 15px;">
            <div class="card-body">
                <h3 class="text-center fw-bold mb-4 text-success">EDITAR CUENTA</h3>
                
                <form action="/editar" method="POST">
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ u.nombre }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Correo</label>
                        <input type="email" name="email" class="form-control" value="{{ u.email }}" required>
                    </div>
                    <div class="row mb-4">
                        <div class="col-6">
                            <label class="small fw-bold text-muted">Género</label>
                            <select name="genero" class="form-select">
                                <option value="Masculino" {% if u.genero == 'Masculino' %}selected{% endif %}>Masculino</option>
                                <option value="Femenino" {% if u.genero == 'Femenino' %}selected{% endif %}>Femenino</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold text-muted">Nacimiento</label>
                            <input type="date" name="fecha_nac" class="form-control" value="{{ u.fecha_nacimiento }}" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm">GUARDAR CAMBIOS</button>
                    <a href="/perfil" class="btn btn-link w-100 text-muted mt-2 text-decoration-none small">Cancelar</a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
