<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - NutriApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="/">🌿 NutriApp</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-light me-3 small">Hola, <b>{{ session['usuario_nombre'] }}</b></span>
                <div class="btn-group">
                    <a href="/perfil" class="btn btn-sm btn-outline-success">Ver Datos</a>
                    <a href="/editar" class="btn btn-sm btn-outline-light">Editar Perfil</a>
                    <a href="/salir" class="btn btn-sm btn-outline-danger">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center mt-5">
        <div class="card p-4 shadow-lg border-0" style="width: 28rem; border-radius: 15px;">
            <div class="card-body">
                <h4 class="text-center fw-bold mb-4 text-success">DATOS DE LA CUENTA</h4>
                <p><b>Nombre:</b> {{ u.nombre }}</p>
                <p><b>Email:</b> {{ u.email }}</p>
                <p><b>Género:</b> {{ u.genero }}</p>
                <p><b>Fecha de Nacimiento:</b> {{ u.fecha_nacimiento }}</p>
            </div>
        </div>
    </div>

</body>
</html>
